<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro con QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* tarjeta */

.container{
background:white;
padding:40px;
border-radius:15px;
width:100%;
max-width:380px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:fadeIn 0.6s ease;
}

h2{
margin-bottom:20px;
color:#333;
}

/* inputs */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
transition:0.2s;
}

input:focus{
border-color:#4facfe;
outline:none;
box-shadow:0 0 5px rgba(79,172,254,0.4);
}

/* botón */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
color: black;
}

/* QR */

.qr-box{
margin-top:25px;
padding:15px;
border-radius:10px;
background:#f5f7fb;
display:flex;
justify-content:center;
}

/* animación */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive */

@media (max-width:480px){

.container{
padding:30px;
}

h2{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Registro</h2>

<input type="text" id="nombre" placeholder="Nombre completo">

<input type="email" id="correo" placeholder="Correo electrónico">

<button onclick="generarQR()">Generar Código QR</button>

<div class="qr-box">
<div id="qrcode"></div>
</div>

</div>

<script>

function generarQR(){

const nombre = document.getElementById("nombre").value;
const correo = document.getElementById("correo").value;

if(!nombre || !correo){
alert("Completa los campos");
return;
}

const url = `https://inti2001.github.io/TestGael/asistencia.html?nombre=${encodeURIComponent(nombre)}&correo=${encodeURIComponent(correo)}`;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{
text:url,
width:200,
height:200
});

}

</script>

</body>
</html>
