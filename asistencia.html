<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- importante para responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmación de Asistencia</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* tarjeta */

.container{
background:white;
padding:35px;
border-radius:16px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
animation:fadeIn 0.6s ease;
}

/* títulos */

h1{
margin-bottom:5px;
color:#333;
font-size:26px;
}

.subtitle{
color:#777;
margin-bottom:20px;
font-size:15px;
}

/* badge */

.badge{
background:#4CAF50;
color:white;
padding:10px 18px;
border-radius:30px;
font-size:14px;
display:inline-block;
margin-bottom:20px;
}

/* caja de info */

.info{
background:#f5f7fb;
border-radius:12px;
padding:18px;
text-align:left;
}

/* filas */

.row{
margin-bottom:12px;
font-size:16px;
word-break:break-word;
}

.label{
font-weight:600;
color:#555;
}

.value{
color:#111;
margin-left:5px;
}

/* footer */

.footer{
margin-top:20px;
font-size:13px;
color:#999;
}

/* animación */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive extra */

@media (max-width:480px){

.container{
padding:25px;
}

h1{
font-size:22px;
}

.row{
font-size:15px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Registro Confirmado</h1>
<div class="subtitle">Lista de asistencia</div>

<div class="badge">
✔ Asistencia registrada
</div>

<div class="info">

<div class="row">
<span class="label">Nombre:</span>
<span class="value" id="nombre"></span>
</div>

<div class="row">
<span class="label">Correo:</span>
<span class="value" id="correo"></span>
</div>

</div>

<div class="footer">
Gracias por registrar tu asistencia
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const nombre = params.get("nombre");
const correo = params.get("correo");

document.getElementById("nombre").textContent = nombre;
document.getElementById("correo").textContent = correo;

</script>

</body>
</html>
